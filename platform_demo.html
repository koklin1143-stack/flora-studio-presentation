<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora Studio Platform Demo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231e1f22'/%3E%3Cpath d='M21 46V18h22v7H30v6h11v7H30v8z' fill='white'/%3E%3C/svg%3E">
<style>
:root {
  --app: #f4f5f7;
  --surface: #ffffff;
  --surface-2: #f8f9fb;
  --surface-3: #eef1f5;
  --ink: #1e1f22;
  --text: #40454d;
  --muted: #6e747c;
  --faint: #a1a8b0;
  --line: #dce2e8;
  --line-strong: #c7d0da;
  --blue: #0b6ffb;
  --blue-soft: #e9f2ff;
  --green: #148c4a;
  --green-soft: #e8f6ee;
  --amber: #a35f18;
  --amber-soft: #fff2df;
  --rose: #b85a70;
  --rose-soft: #fff1f4;
  --red: #c24134;
  --red-soft: #fff0ee;
  --shadow: 0 1px 2px rgba(30,31,34,0.06), 0 18px 42px rgba(30,31,34,0.10);
  --shadow-soft: 0 1px 2px rgba(30,31,34,0.06);
  --radius: 8px;
  --sans: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--app); color: var(--ink); }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.45;
  background: var(--app);
}

button,
textarea,
input,
select { font: inherit; }

button { cursor: pointer; }

button:focus-visible,
textarea:focus-visible,
input:focus-visible,
select:focus-visible,
summary:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 58px 1fr;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  height: 58px;
  display: grid;
  grid-template-columns: 260px 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 0 18px;
  border-bottom: 1px solid rgba(220,226,232,0.9);
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(24px) saturate(1.5);
}

.brand {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: var(--radius);
  display: grid;
  place-items: center;
  color: #fff;
  background: var(--ink);
  font-weight: 820;
}

.brand-title {
  font-weight: 760;
  font-size: 15px;
}

.brand-sub {
  color: var(--muted);
  font-size: 12px;
}

.project-pill {
  justify-self: center;
  width: min(560px, 100%);
  height: 38px;
  display: grid;
  grid-template-columns: 20px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
}

.project-pill strong,
.project-pill span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.project-pill strong {
  font-size: 13px;
}

.project-pill span {
  color: var(--muted);
  font-size: 12px;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon {
  width: 18px;
  height: 18px;
  display: inline-block;
  flex: 0 0 18px;
}

.btn {
  min-height: 38px;
  min-width: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 12px;
  font-weight: 680;
  transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
}

.btn:hover {
  background: var(--surface-2);
  border-color: var(--line-strong);
}

.btn:active { transform: scale(0.985); }

.btn.primary {
  border-color: var(--blue);
  background: var(--blue);
  color: #fff;
  box-shadow: 0 8px 22px rgba(11,111,251,0.22);
}

.btn.ghost { background: transparent; }
.btn.small {
  min-height: 34px;
  padding: 0 10px;
  font-size: 12px;
}

.badge {
  min-height: 26px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 999px;
  padding: 0 9px;
  font-size: 12px;
  font-weight: 680;
  white-space: nowrap;
}

.badge.blue { background: var(--blue-soft); color: #075ab8; }
.badge.green { background: var(--green-soft); color: #0b6d37; }
.badge.amber { background: var(--amber-soft); color: #78450f; }
.badge.red { background: var(--red-soft); color: var(--red); }
.badge.neutral { background: #eceff3; color: var(--text); }

.studio {
  position: relative;
  min-height: calc(100vh - 58px);
  display: grid;
  grid-template-columns: 1fr 346px;
  overflow: hidden;
}

.stage {
  position: relative;
  min-width: 0;
  min-height: calc(100vh - 58px);
  display: grid;
  grid-template-rows: 1fr auto;
  background:
    linear-gradient(rgba(30,31,34,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,31,34,0.035) 1px, transparent 1px),
    #fbfcfd;
  background-size: 76px 76px;
}

.model-space {
  position: relative;
  min-height: 0;
  overflow: hidden;
}

#modelCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

.stage-hud {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 5;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.view-toggle {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 5;
  display: inline-flex;
  gap: 4px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.84);
  backdrop-filter: blur(18px);
}

.view-toggle button {
  min-height: 30px;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  padding: 0 10px;
  font-size: 12px;
  font-weight: 680;
}

.view-toggle button.active {
  background: var(--ink);
  color: #fff;
}

.focus-note {
  position: absolute;
  left: 16px;
  bottom: 156px;
  z-index: 4;
  max-width: 360px;
  border: 1px solid rgba(220,226,232,0.9);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.82);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
  padding: 12px 13px;
}

.focus-note strong {
  display: block;
  margin-bottom: 4px;
}

.focus-note span {
  color: var(--muted);
  font-size: 12px;
}

.composer {
  z-index: 10;
  margin: 0 16px 16px;
  border: 1px solid rgba(220,226,232,0.92);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.92);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.composer-main {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 13px;
  border-bottom: 1px solid var(--line);
}

.prompt-box {
  display: grid;
  grid-template-columns: 38px 1fr;
  gap: 10px;
  align-items: start;
}

.prompt-icon {
  width: 38px;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  display: grid;
  place-items: center;
  color: var(--blue);
  background: var(--surface-2);
}

.prompt-input {
  width: 100%;
  min-height: 48px;
  max-height: 110px;
  border: 0;
  resize: none;
  outline: 0;
  color: var(--ink);
  background: transparent;
  padding: 0;
}

.prompt-input::placeholder {
  color: var(--faint);
}

.composer-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.quick-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: center;
  padding: 10px 13px;
}

.quick-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 680;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.chip {
  min-height: 32px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text);
  padding: 0 11px;
  font-size: 12px;
  font-weight: 680;
}

.chip[aria-pressed="true"] {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}

.chip.scene-active {
  background: var(--blue-soft);
  border-color: rgba(11,111,251,0.5);
  color: #075ab8;
}

.drawer {
  position: relative;
  z-index: 20;
  border-left: 1px solid var(--line);
  background: var(--surface);
  display: grid;
  grid-template-rows: auto auto 1fr;
  min-width: 0;
}

.drawer-head {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px;
  border-bottom: 1px solid var(--line);
}

.drawer-title {
  font-size: 15px;
  font-weight: 760;
}

.drawer-sub {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.result-hero {
  padding: 14px;
  border-bottom: 1px solid var(--line);
  display: grid;
  gap: 12px;
}

.result-title {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.result-title h2 {
  margin: 0;
  font-size: 22px;
  line-height: 1.18;
}

.result-title p {
  margin: 6px 0 0;
  color: var(--text);
}

.score {
  min-width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 7px solid var(--green-soft);
  display: grid;
  place-items: center;
  color: #0b6d37;
  background: var(--surface);
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 760;
}

.plain-list {
  display: grid;
  gap: 8px;
}

.plain-item {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}

.plain-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--blue-soft);
  color: #075ab8;
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 760;
}

.plain-title {
  font-weight: 720;
}

.plain-copy {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.drawer-scroll {
  overflow: auto;
}

.task-section {
  border-bottom: 1px solid var(--line);
}

.section-bar {
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}

.section-bar h3 {
  margin: 0;
  font-size: 14px;
}

.task-list {
  display: grid;
}

.task-row {
  min-height: 56px;
  display: grid;
  grid-template-columns: 30px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}

.task-row:last-child { border-bottom: 0; }

.task-index {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--blue-soft);
  color: #075ab8;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 760;
}

.task-title {
  font-weight: 720;
}

.task-meta {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.details {
  background: var(--surface);
}

.details summary {
  min-height: 46px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-weight: 720;
  cursor: pointer;
}

.detail-body {
  display: grid;
  gap: 10px;
  padding: 0 14px 14px;
}

.material-compact {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}

.material-row {
  min-height: 50px;
  display: grid;
  grid-template-columns: 1fr 110px;
  gap: 10px;
  align-items: center;
  padding: 9px 11px;
  border-bottom: 1px solid var(--line);
}

.material-row:last-child { border-bottom: 0; }

.material-name { font-weight: 720; }
.material-meta {
  color: var(--muted);
  font-size: 12px;
}

.stepper {
  display: grid;
  grid-template-columns: 32px 1fr 32px;
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
}

.stepper button {
  border: 0;
  height: 32px;
  background: var(--surface-2);
}

.stepper output {
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 760;
}

.control-grid {
  display: grid;
  gap: 10px;
}

.field {
  display: grid;
  gap: 7px;
}

.field label {
  color: var(--text);
  font-size: 12px;
  font-weight: 680;
}

.select,
.input {
  min-height: 38px;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 0 10px;
}

.segmented {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 5px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
}

.segmented button {
  min-height: 32px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 680;
}

.segmented button.active {
  background: var(--surface);
  border-color: var(--line);
  color: var(--ink);
}

.kit-table-wrap { overflow-x: auto; }
.kit-table {
  width: 100%;
  min-width: 520px;
  border-collapse: collapse;
}

.kit-table th,
.kit-table td {
  padding: 10px 11px;
  border-top: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

.kit-table th {
  color: var(--muted);
  background: var(--surface-2);
  font-size: 12px;
}

.kit-name { font-weight: 720; }
.kit-note {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.bar {
  width: 82px;
  height: 7px;
  margin-top: 6px;
  border-radius: 999px;
  overflow: hidden;
  background: #eceff3;
}

.bar span {
  display: block;
  width: var(--value, 50%);
  height: 100%;
  background: var(--green);
}

.bar.warn span { background: var(--amber); }

.toast {
  position: fixed;
  z-index: 80;
  right: 20px;
  bottom: 20px;
  width: min(380px, calc(100vw - 40px));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.96);
  box-shadow: var(--shadow);
  padding: 13px 14px;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 180ms ease, transform 180ms ease;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast strong { display: block; }
.toast span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 1160px) {
  .studio {
    grid-template-columns: 1fr;
    overflow: visible;
  }

  .stage {
    min-height: calc(100vh - 58px);
  }

  .drawer {
    border-left: 0;
    border-top: 1px solid var(--line);
  }
}

@media (max-width: 760px) {
  body { font-size: 16px; }

  .app { grid-template-rows: auto 1fr; }

  .topbar {
    height: auto;
    grid-template-columns: 1fr;
    padding: 12px 14px;
  }

  .brand-sub { display: none; }

  .project-pill {
    width: 100%;
    justify-self: stretch;
  }

  .top-actions {
    width: 100%;
  }

  .top-actions .btn { flex: 1; }

  .stage {
    min-height: 760px;
  }

  .model-space {
    min-height: 430px;
  }

  .stage-hud {
    top: 10px;
    left: 10px;
    right: 10px;
  }

  .view-toggle {
    top: 74px;
    right: 10px;
    bottom: auto;
  }

  .focus-note {
    display: none;
  }

  .composer {
    margin: 0 10px 10px;
  }

  .composer-main {
    grid-template-columns: 1fr;
  }

  .composer-actions .btn {
    width: 100%;
  }

  .quick-row {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .drawer {
    min-height: auto;
  }

  .task-row {
    grid-template-columns: 30px 1fr;
  }

  .task-row .badge {
    grid-column: 2;
    justify-self: start;
  }

  .material-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">F</div>
      <div>
        <div class="brand-title">Flora Studio</div>
        <div class="brand-sub">动态花艺建模工作台</div>
      </div>
    </div>

    <div class="project-pill" aria-live="polite">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14m7-7H5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div>
        <strong id="projectName">婚礼主桌动态方案</strong>
        <span id="projectMeta">开合动作 · 库存 67%</span>
      </div>
      <span class="badge amber" id="projectState">待补货</span>
    </div>

    <div class="top-actions">
      <button class="btn ghost small" id="resetBtn" type="button">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7v5h5M20 17a8 8 0 0 1-13.5-5.8L4 12m16 5v-5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        重置
      </button>
      <button class="btn primary small" id="generateBtn" type="button">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14m-6-6 6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        生成清单
      </button>
    </div>
  </header>

  <main class="studio">
    <section class="stage" aria-label="动态花艺建模预览">
      <div class="model-space">
        <canvas id="modelCanvas" aria-label="建模感动态花艺预览"></canvas>
        <div class="stage-hud">
          <span class="badge neutral" id="stageScene">婚礼主桌</span>
          <span class="badge neutral" id="stageMotion">呼吸 + 开合 + 祝福感</span>
          <span class="badge neutral" id="stageWeight">979g</span>
        </div>
        <div class="view-toggle" aria-label="视角切换">
          <button class="active" type="button" data-view="front">正视</button>
          <button type="button" data-view="left">侧视</button>
          <button type="button" data-view="top">俯视</button>
        </div>
        <div class="focus-note">
          <strong id="focusTitle">系统已生成开合动作方案</strong>
          <span id="focusCopy">机电结构隐藏在花瓶背后，花艺师只需要确认动作情绪和准备清单。</span>
        </div>
      </div>

      <section class="composer" aria-label="创作输入">
        <div class="composer-main">
          <div class="prompt-box">
            <div class="prompt-icon"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16M12 4v10m0-10c-4 2-6 5-6 8m6-8c4 2 6 5 6 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
            <textarea class="prompt-input" id="ideaText">婚礼主桌花艺，希望像被祝福一样缓慢展开，动作要克制，不要太机械，机电尽量藏在花瓶背后。</textarea>
          </div>
          <div class="composer-actions">
            <button class="btn primary" id="previewBtn" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
              更新预览
            </button>
          </div>
        </div>

<div class="toast" id="toast" role="status" aria-live="polite">
  <strong id="toastTitle">预览已更新</strong>
  <span id="toastCopy">系统已重新生成建模预览和清单。</span>
</div>

<script>
const sceneLabels = {
  wedding: '婚礼主桌',
  window: '橱窗陈列',
  gift: '礼物花束',
  exhibition: '展览装置',
  retail: '商业空间'
};

const motionLabels = {
  breath: '呼吸',
  sway: '摇曳',
  bloom: '开合',
  blessing: '祝福感'
};

const hideLabels = {
  back: '花瓶背后',
  base: '底座内部',
  center: '花丛中心',
  branch: '枝条后方'
};

const intensityMap = {
  soft: { label: '克制', ratio: 0.24, cycle: '6.8s', angle: '18°', bloom: 1 },
  clear: { label: '明显', ratio: 0.31, cycle: '5.4s', angle: '24°', bloom: 1.18 },
  stage: { label: '舞台', ratio: 0.38, cycle: '4.8s', angle: '32°', bloom: 1.36 }
};

const materials = [
  { key: 'hydrangea', name: '绣球', grams: 42, count: 7 },
  { key: 'rose', name: '玫瑰', grams: 18, count: 12 },
  { key: 'eustoma', name: '洋桔梗', grams: 12, count: 9 },
  { key: 'greenery', name: '叶材', grams: 8, count: 16 },
  { key: 'feather', name: '仿生翅片', grams: 14, count: 6 }
];

const kits = [
  {
    key: 'bloom',
    name: '开合套件',
    display: '开合动作方案',
    note: '花瓣层次展开、祝福感、婚礼主视觉',
    capacity: 360,
    time: 45,
    motion: ['bloom', 'blessing', 'breath'],
    parts: [
      { name: 'Servo Leaf', need: 2, stock: 3, price: 96 },
      { name: 'Magic Snap', need: 6, stock: 4, price: 38 },
      { name: 'Smart Box', need: 1, stock: 0, price: 208 }
    ]
  },
  {
    key: 'sway',
    name: '摇曳套件',
    display: '摇曳动作方案',
    note: '枝条摆动、橱窗循环、轻量花束',
    capacity: 280,
    time: 35,
    motion: ['sway', 'breath'],
    parts: [
      { name: 'Micro Servo', need: 2, stock: 5, price: 72 },
      { name: 'Flex Stem', need: 4, stock: 5, price: 28 },
      { name: 'Smart Box', need: 1, stock: 0, price: 208 }
    ]
  },
  {
    key: 'breath',
    name: '呼吸套件',
    display: '呼吸动作方案',
    note: '低速起伏、礼物花束、稳定优先',
    capacity: 220,
    time: 28,
    motion: ['breath'],
    parts: [
      { name: 'Pulse Motor', need: 1, stock: 2, price: 84 },
      { name: 'Soft Link', need: 5, stock: 7, price: 18 },
      { name: 'Mini Box', need: 1, stock: 2, price: 138 }
    ]
  }
];

const state = {
  scene: 'wedding',
  motions: new Set(['breath', 'bloom', 'blessing']),
  intensity: 'soft',
  hidePlace: 'back',
  view: 'front',
  tick: 0
};

const canvas = document.getElementById('modelCanvas');
const ctx = canvas.getContext('2d');

function byId(id) {
  return document.getElementById(id);
}

function getWeights() {
  const raw = materials.reduce((sum, item) => sum + item.grams * item.count, 0);
  const total = Math.round(raw * 1.18);
  const moving = Math.round(total * intensityMap[state.intensity].ratio);
  return { raw, total, moving };
}

function getMissing(kit) {
  return kit.parts
    .filter(part => part.stock < part.need)
    .map(part => ({ ...part, missing: part.need - part.stock }));
}

function scoreKit(kit) {
  const { moving } = getWeights();
  const motionScore = [...state.motions].reduce((score, motion) => score + (kit.motion.includes(motion) ? 17 : 0), 34);
  const loadPenalty = moving > kit.capacity ? Math.round((moving - kit.capacity) / 4) : 0;
  const stockPenalty = getMissing(kit).length * 7;
  const safeBonus = moving <= kit.capacity ? 8 : 0;
  return Math.max(42, Math.min(98, motionScore + safeBonus - loadPenalty - stockPenalty));
}

function getSortedKits() {
  return kits.map(kit => ({ ...kit, score: scoreKit(kit), missing: getMissing(kit) }))
    .sort((a, b) => b.score - a.score);
}

function getKit() {
  return getSortedKits()[0];
}

function getStock(kit) {
  const need = kit.parts.reduce((sum, part) => sum + part.need, 0);
  const covered = kit.parts.reduce((sum, part) => sum + Math.min(part.need, part.stock), 0);
  return Math.round((covered / need) * 100);
}

function motionText() {
  return [...state.motions].map(motion => motionLabels[motion]).join(' + ') || '呼吸';
}

function showToast(title, copy) {
  const toast = byId('toast');
  byId('toastTitle').textContent = title;
  byId('toastCopy').textContent = copy;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const scale = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.round(rect.width * scale));
  canvas.height = Math.max(1, Math.round(rect.height * scale));
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}

function projectPoint(x, y, z, cx, cy, scale) {
  let rx = -0.45;
  let ry = state.view === 'left' ? -0.72 : state.view === 'top' ? -0.08 : -0.36;
  let rz = state.view === 'left' ? 0.42 : state.view === 'top' ? 0.18 : Math.sin(state.tick * 0.001) * 0.08;

  const cosy = Math.cos(ry), siny = Math.sin(ry);
  let x1 = x * cosy + z * siny;
  let z1 = -x * siny + z * cosy;

  const cosx = Math.cos(rx), sinx = Math.sin(rx);
  let y1 = y * cosx - z1 * sinx;
  let z2 = y * sinx + z1 * cosx;

  const cosz = Math.cos(rz), sinz = Math.sin(rz);
  let x2 = x1 * cosz - y1 * sinz;
  let y2 = x1 * sinz + y1 * cosz;

  return { x: cx + x2 * scale, y: cy - y2 * scale, z: z2 };
}

function ellipsePetal(cx, cy, rx, ry, rotate, fillA, fillB, stroke) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotate);
  const gradient = ctx.createRadialGradient(-rx * 0.28, -ry * 0.28, 4, 0, 0, Math.max(rx, ry));
  gradient.addColorStop(0, fillA);
  gradient.addColorStop(0.65, fillB);
  gradient.addColorStop(1, '#d89baa');
  ctx.fillStyle = gradient;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(30,31,34,0.12)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 10;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.stroke();
  ctx.restore();
}

function drawStem(a, b) {
  const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
  grad.addColorStop(0, '#aab3a4');
  grad.addColorStop(1, '#52604f');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function drawModel(time = 0) {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const cx = w / 2;
  const cy = h * 0.55;
  const s = Math.min(w, h) * 0.42;
  const kit = getKit();
  const bloom = state.motions.has('bloom') ? Math.sin(time * 0.0012) * 0.08 * intensityMap[state.intensity].bloom : 0;
  const sway = state.motions.has('sway') ? Math.sin(time * 0.001) * 0.08 : 0;
  const breath = state.motions.has('breath') ? 1 + Math.sin(time * 0.0014) * 0.018 : 1;

  ctx.clearRect(0, 0, w, h);

  const floor = ctx.createRadialGradient(cx, cy + s * 0.38, 10, cx, cy + s * 0.38, s * 0.7);
  floor.addColorStop(0, 'rgba(30,31,34,0.13)');
  floor.addColorStop(0.55, 'rgba(30,31,34,0.05)');
  floor.addColorStop(1, 'rgba(30,31,34,0)');
  ctx.fillStyle = floor;
  ctx.beginPath();
  ctx.ellipse(cx, cy + s * 0.43, s * 0.55, s * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  const baseTop = projectPoint(0, -0.54, 0, cx, cy, s);
  const baseBottom = projectPoint(0, -0.78, 0, cx, cy, s);

  const stems = [
    [[0, -0.62, 0], [-0.62 + sway, 0.06, -0.18]],
    [[0, -0.62, 0], [0.62 + sway, 0.06, -0.18]],
    [[0, -0.62, 0], [-0.38 + sway, 0.34, 0.08]],
    [[0, -0.62, 0], [0.38 + sway, 0.34, 0.08]],
    [[0, -0.62, 0], [0, 0.62, 0.12]]
  ];
  stems.forEach(([from, to]) => drawStem(projectPoint(...from, cx, cy, s), projectPoint(...to, cx, cy, s)));

  const petals = [
    { p: [-0.58 - bloom, 0.10, -0.1], rx: 0.22, ry: 0.55, r: -1.1, z: -0.1 },
    { p: [0.58 + bloom, 0.10, -0.1], rx: 0.22, ry: 0.55, r: 1.1, z: -0.1 },
    { p: [-0.34 - bloom, 0.40, 0.08], rx: 0.18, ry: 0.50, r: -0.6, z: 0.08 },
    { p: [0.34 + bloom, 0.40, 0.08], rx: 0.18, ry: 0.50, r: 0.6, z: 0.08 },
    { p: [0, 0.58 + bloom, 0.16], rx: 0.20, ry: 0.46, r: 0, z: 0.16 },
    { p: [0, 0.20, 0.26], rx: 0.26, ry: 0.48, r: 0, z: 0.26 }
  ].sort((a, b) => a.z - b.z);

  petals.forEach(petal => {
    const pt = projectPoint(...petal.p, cx, cy, s * breath);
    ellipsePetal(pt.x, pt.y, petal.rx * s * breath, petal.ry * s * breath, petal.r, '#fffafd', '#f6d8de', '#dfadc0');
  });

  const center = projectPoint(0, 0.2, 0.34, cx, cy, s);
  const greenGrad = ctx.createRadialGradient(center.x - 12, center.y - 16, 4, center.x, center.y, 42);
  greenGrad.addColorStop(0, '#c9f8d9');
  greenGrad.addColorStop(0.48, '#42c47b');
  greenGrad.addColorStop(1, '#12804b');
  ctx.fillStyle = greenGrad;
  ctx.beginPath();
  ctx.arc(center.x, center.y, s * 0.085, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.save();
  const baseW = s * 0.38;
  const baseH = s * 0.16;
  const baseGrad = ctx.createLinearGradient(baseBottom.x - baseW, baseBottom.y, baseBottom.x + baseW, baseBottom.y);
  baseGrad.addColorStop(0, '#ffffff');
  baseGrad.addColorStop(0.5, '#f6f8fa');
  baseGrad.addColorStop(1, '#e8edf2');
  ctx.fillStyle = baseGrad;
  ctx.strokeStyle = '#cfd6de';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(baseBottom.x - baseW / 2, baseBottom.y - baseH / 2, baseW, baseH, 18);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#111315';
  ctx.fillRect(baseTop.x - 10, baseTop.y + 4, 20, 28);
  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.strokeStyle = state.hidePlace === 'back' ? '#0b6ffb' : '#148c4a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(baseBottom.x - 42, baseBottom.y - 46, 84, 30, 15);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = state.hidePlace === 'back' ? '#075ab8' : '#0b6d37';
  ctx.font = '700 12px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('隐藏结构', baseBottom.x, baseBottom.y - 31);

  byId('focusTitle').textContent = `系统已生成${kit.display}`;
}

function animate(time) {
  state.tick = time;
  drawModel(time);
  requestAnimationFrame(animate);
}

function renderMaterials() {
  byId('materialList').innerHTML = materials.map(item => `
    <div class="material-row">
      <div>
        <div class="material-name">${item.name}</div>
        <div class="material-meta">${item.grams}g / 支 · ${item.grams * item.count}g</div>
      </div>
      <div class="stepper" aria-label="${item.name}数量">
        <button type="button" data-material="${item.key}" data-delta="-1" aria-label="减少${item.name}">−</button>
        <output>${item.count}</output>
        <button type="button" data-material="${item.key}" data-delta="1" aria-label="增加${item.name}">+</button>
      </div>
    </div>
  `).join('');
}

function renderReasons() {
  const kit = getKit();
  const { moving } = getWeights();
  const reasons = [
    { title: `${sceneLabels[state.scene]} · ${motionText()}`, copy: `${kit.display}符合当前动感，机电隐藏在${hideLabels[state.hidePlace]}。` },
    { title: `可动重量 ${moving}g`, copy: moving <= kit.capacity ? '在套件承载范围内。' : '重量偏高，建议减少可动花材。' },
    { title: kit.missing.length ? `需要补 ${kit.missing.length} 类零件` : '库存已满足', copy: kit.missing.length ? kit.missing.map(part => `${part.name} × ${part.missing}`).join('，') : '可以直接进入装配准备。' }
  ];
  byId('reasonList').innerHTML = reasons.map((item, index) => `
    <div class="plain-item">
      <div class="plain-num">${index + 1}</div>
      <div>
        <div class="plain-title">${item.title}</div>
        <div class="plain-copy">${item.copy}</div>
      </div>
    </div>
  `).join('');
}

function renderTasks() {
  const kit = getKit();
  const tasks = [
    { title: `${kit.name}装配模板`, meta: `${kit.time} 分钟 · ${hideLabels[state.hidePlace]}`, status: '已准备', tone: 'green' },
    { title: '动作参数', meta: `${intensityMap[state.intensity].cycle} · ${intensityMap[state.intensity].angle} · ${intensityMap[state.intensity].label}`, status: '已同步', tone: 'blue' }
  ];
  kit.missing.forEach(part => {
    tasks.push({
      title: `${part.name} × ${part.missing}`,
      meta: `预计 ¥${part.missing * part.price} · 到订单确认前停止`,
      status: '待确认',
      tone: 'amber'
    });
  });
  if (!kit.missing.length) {
    tasks.push({ title: '库存满足', meta: '无需补货，可进入装配准备。', status: '完成', tone: 'green' });
  }
  byId('taskList').innerHTML = tasks.map((task, index) => `
    <div class="task-row">
      <div class="task-index">${index + 1}</div>
      <div>
        <div class="task-title">${task.title}</div>
        <div class="task-meta">${task.meta}</div>
      </div>
      <span class="badge ${task.tone}">${task.status}</span>
    </div>
  `).join('');
  byId('taskCount').textContent = `${tasks.length} 项`;
}

function renderKits() {
  byId('kitRows').innerHTML = getSortedKits().map((kit, index) => {
    const stock = getStock(kit);
    return `
      <tr>
        <td><div class="kit-name">${kit.name}</div><div class="kit-note">${kit.note}</div></td>
        <td><strong>${kit.score}</strong><div class="bar" style="--value:${kit.score}%"><span></span></div></td>
        <td><span class="badge ${stock >= 90 ? 'green' : 'amber'}">${stock}%</span><div class="bar ${stock < 90 ? 'warn' : ''}" style="--value:${stock}%"><span></span></div></td>
        <td>${index === 0 ? '推荐' : '备选'}</td>
      </tr>
    `;
  }).join('');
}

function update() {
  const kit = getKit();
  const stock = getStock(kit);
  const { total } = getWeights();
  const riskText = kit.missing.length ? '待补货' : '库存齐';
  const riskTone = kit.missing.length ? 'amber' : 'green';

  byId('projectName').textContent = `${sceneLabels[state.scene]}动态方案`;
  byId('projectMeta').textContent = `${kit.display.replace('方案', '')} · 库存 ${stock}%`;
  byId('projectState').textContent = riskText;
  byId('projectState').className = `badge ${riskTone}`;
  byId('stageScene').textContent = sceneLabels[state.scene];
  byId('stageMotion').textContent = motionText();
  byId('stageWeight').textContent = `${total}g`;
  byId('stockBadge').textContent = kit.missing.length ? '需补货' : '库存齐';
  byId('stockBadge').className = `badge ${riskTone}`;
  byId('kitTitle').textContent = kit.display;
  byId('kitCopy').textContent = `${kit.note}。${kit.missing.length ? '缺少零件已放进下单前清单。' : '当前库存满足，可直接进入装配准备。'}`;
  byId('score').textContent = kit.score;
  byId('focusCopy').textContent = `机电结构隐藏在${hideLabels[state.hidePlace]}，花艺师只需要确认动作情绪和准备清单。`;
  renderMaterials();
  renderReasons();
  renderTasks();
  renderKits();
}

function bindEvents() {
  document.querySelectorAll('[data-group="scene"] .chip').forEach(button => {
    button.addEventListener('click', () => {
      state.scene = button.dataset.value;
      document.querySelectorAll('[data-group="scene"] .chip').forEach(item => {
        const active = item === button;
        item.setAttribute('aria-pressed', String(active));
        item.classList.toggle('scene-active', active);
      });
      update();
    });
  });

  document.querySelectorAll('[data-group="motion"] .chip').forEach(button => {
    button.addEventListener('click', () => {
      const value = button.dataset.value;
      if (state.motions.has(value) && state.motions.size > 1) {
        state.motions.delete(value);
      } else {
        state.motions.add(value);
      }
      button.setAttribute('aria-pressed', String(state.motions.has(value)));
      update();
    });
  });

  document.querySelectorAll('[data-view]').forEach(button => {
    button.addEventListener('click', () => {
      state.view = button.dataset.view;
      document.querySelectorAll('[data-view]').forEach(item => item.classList.toggle('active', item === button));
    });
  });

  document.querySelectorAll('[data-segment]').forEach(group => {
    group.querySelectorAll('button').forEach(button => {
      button.addEventListener('click', () => {
        group.querySelectorAll('button').forEach(item => item.classList.toggle('active', item === button));
        state[group.dataset.segment] = button.dataset.value;
        update();
      });
    });
  });

  byId('hidePlace').addEventListener('change', event => {
    state.hidePlace = event.target.value;
    update();
  });

  byId('materialList').addEventListener('click', event => {
    const button = event.target.closest('button[data-material]');
    if (!button) return;
    const material = materials.find(item => item.key === button.dataset.material);
    material.count = Math.max(0, material.count + Number(button.dataset.delta));
    update();
  });

  byId('previewBtn').addEventListener('click', () => {
    update();
    showToast('预览已更新', '建模预览、推荐方案和清单已重新生成。');
  });

  byId('generateBtn').addEventListener('click', () => {
    update();
    showToast('清单已生成', '系统已整理到下单确认前流程。');
  });

  byId('resetBtn').addEventListener('click', () => {
    state.scene = 'wedding';
    state.motions = new Set(['breath', 'bloom', 'blessing']);
    state.intensity = 'soft';
    state.hidePlace = 'back';
    state.view = 'front';
    materials[0].count = 7;
    materials[1].count = 12;
    materials[2].count = 9;
    materials[3].count = 16;
    materials[4].count = 6;
    byId('hidePlace').value = 'back';
    document.querySelectorAll('[data-group="scene"] .chip').forEach(item => {
      const active = item.dataset.value === 'wedding';
      item.setAttribute('aria-pressed', String(active));
      item.classList.toggle('scene-active', active);
    });
    document.querySelectorAll('[data-group="motion"] .chip').forEach(item => item.setAttribute('aria-pressed', String(state.motions.has(item.dataset.value))));
    document.querySelectorAll('[data-segment="intensity"] button').forEach(item => item.classList.toggle('active', item.dataset.value === 'soft'));
    document.querySelectorAll('[data-view]').forEach(item => item.classList.toggle('active', item.dataset.view === 'front'));
    update();
    showToast('已重置', '已恢复默认婚礼主桌方案。');
  });
}

window.addEventListener('resize', () => {
  resizeCanvas();
  drawModel(performance.now());
});

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    this.moveTo(x + radius, y);
    this.arcTo(x + w, y, x + w, y + h, radius);
    this.arcTo(x + w, y + h, x, y + h, radius);
    this.arcTo(x, y + h, x, y, radius);
    this.arcTo(x, y, x + w, y, radius);
    return this;
  };
}

resizeCanvas();
bindEvents();
update();
requestAnimationFrame(animate);
</script>
</body>
</html>
