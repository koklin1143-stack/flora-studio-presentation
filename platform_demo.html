<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora Studio Skill</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231d1d1f'/%3E%3Cpath d='M21 46V18h22v7H30v6h11v7H30v8z' fill='white'/%3E%3C/svg%3E">
<style>
:root {
  --page: #f6f7f8;
  --card: #ffffff;
  --ink: #1d1d1f;
  --text: #3f454c;
  --muted: #747b84;
  --faint: #aab1ba;
  --line: #e0e5eb;
  --line-strong: #cad2dc;
  --green: #32c08b;
  --green-soft: #def8ee;
  --blue: #1683ff;
  --blue-soft: #e8f2ff;
  --yellow: #ffd96a;
  --yellow-soft: #fff6ce;
  --rose: #ff9c91;
  --rose-soft: #fff0ee;
  --mint: #bdf1dd;
  --shadow: 0 20px 60px rgba(30, 35, 42, 0.12);
  --shadow-soft: 0 1px 2px rgba(30, 35, 42, 0.08);
  --radius: 8px;
  --sans: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--page); color: var(--ink); }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  line-height: 1.45;
  background:
    linear-gradient(120deg, rgba(50,192,139,0.12), transparent 34%),
    linear-gradient(300deg, rgba(22,131,255,0.10), transparent 38%),
    var(--page);
}

button,
textarea {
  font: inherit;
}

button { cursor: pointer; }

button:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

.page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
}

.skill-card {
  width: min(980px, 100%);
  border: 1px solid rgba(224,229,235,0.92);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.92);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.hero {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 20px;
  padding: 34px 36px 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand-mark {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: linear-gradient(145deg, #d8f8eb, #bdf1dd);
  position: relative;
}

.brand-mark::before {
  content: "";
  width: 42px;
  height: 42px;
  border-radius: 50% 50% 46% 46%;
  background: linear-gradient(155deg, #1f91ff, #6a8bff);
  box-shadow: inset 0 -12px 18px rgba(0,0,0,0.10);
}

.brand-mark::after {
  content: "";
  position: absolute;
  bottom: 14px;
  width: 34px;
  height: 9px;
  border-radius: 999px;
  background: #ffbb32;
}

.brand-title {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 10px;
  font-size: clamp(28px, 4vw, 42px);
  line-height: 1.05;
  font-weight: 820;
}

.brand-title span {
  color: #42c691;
}

.brand-sub {
  margin-top: 7px;
  color: var(--muted);
  font-size: 20px;
  font-weight: 620;
}

.assistant-orb {
  justify-self: end;
  align-self: center;
  width: 132px;
  height: 132px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 35% 24%, rgba(255,255,255,0.95), transparent 22%),
    linear-gradient(145deg, #76e4bf, #2ec59c);
  box-shadow: 0 18px 38px rgba(22, 150, 120, 0.22);
}

.assistant-face {
  width: 78px;
  height: 50px;
  border-radius: 24px;
  background: #fff;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: center;
  justify-items: center;
  padding: 0 15px;
  box-shadow: inset 0 -4px 10px rgba(30,35,42,0.08);
}

.assistant-face span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--ink);
}

.message-row {
  display: grid;
  grid-template-columns: 1fr 112px;
  gap: 22px;
  padding: 0 36px 20px;
  align-items: center;
}

.bubble {
  min-height: 116px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow-soft);
  padding: 22px 24px;
  display: grid;
  align-content: center;
}

.bubble strong {
  display: block;
  font-size: 22px;
  line-height: 1.35;
}

.bubble span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 16px;
}

.mini-model {
  width: 112px;
  height: 112px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 68%, rgba(30,35,42,0.14), transparent 36%),
    linear-gradient(180deg, #fafdff, #eff4f8);
  border: 1px solid var(--line);
  display: grid;
  place-items: center;
  overflow: hidden;
}

#modelCanvas {
  width: 112px;
  height: 112px;
  display: block;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
  padding: 4px 36px 22px;
}

.action-card {
  min-height: 160px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow-soft);
  display: grid;
  align-content: start;
  justify-items: center;
  gap: 12px;
  padding: 22px 16px 18px;
  text-align: center;
  color: var(--ink);
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}

.action-card:hover,
.action-card.active {
  transform: translateY(-2px);
  border-color: var(--line-strong);
  box-shadow: 0 10px 28px rgba(30,35,42,0.10);
}

.action-icon {
  width: 66px;
  height: 66px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--ink);
}

.action-icon svg {
  width: 31px;
  height: 31px;
}

.action-card[data-mode="idea"] .action-icon { background: var(--green-soft); }
.action-card[data-mode="preview"] .action-icon { background: var(--yellow-soft); }
.action-card[data-mode="kit"] .action-icon { background: var(--rose-soft); }
.action-card[data-mode="list"] .action-icon { background: #dff7ed; }

.action-title {
  font-size: 20px;
  font-weight: 780;
}

.action-copy {
  color: var(--muted);
  font-size: 14px;
}

.result-panel {
  margin: 0 36px 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(180deg, #fff, #fbfcfd);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  overflow: hidden;
}

.result-item {
  min-height: 82px;
  padding: 15px 17px;
  border-right: 1px solid var(--line);
}

.result-item:last-child {
  border-right: 0;
}

.result-item span {
  display: block;
  color: var(--muted);
  font-size: 13px;
}

.result-item strong {
  display: block;
  margin-top: 6px;
  font-size: 17px;
}

.composer {
  display: grid;
  grid-template-columns: 1fr 58px;
  gap: 10px;
  padding: 0 36px 30px;
}

.input-shell {
  min-height: 58px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  display: grid;
  grid-template-columns: 44px 1fr;
  align-items: center;
  padding: 0 14px;
  box-shadow: var(--shadow-soft);
}

.input-shell svg {
  color: var(--faint);
}

.prompt {
  width: 100%;
  min-height: 24px;
  max-height: 90px;
  border: 0;
  outline: 0;
  resize: none;
  color: var(--ink);
  background: transparent;
  padding: 17px 0 13px;
}

.prompt::placeholder {
  color: var(--faint);
}

.send-btn {
  width: 58px;
  height: 58px;
  border: 0;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: #fff;
  background: linear-gradient(145deg, #67d9b5, #28bb8c);
  box-shadow: 0 14px 28px rgba(40,187,140,0.28);
}

.send-btn svg {
  width: 25px;
  height: 25px;
}

.details {
  margin: 0 36px 32px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  overflow: hidden;
}

.details summary {
  min-height: 46px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  cursor: pointer;
  font-weight: 720;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border-top: 1px solid var(--line);
}

.detail-cell {
  padding: 14px 16px;
  border-right: 1px solid var(--line);
}

.detail-cell:last-child {
  border-right: 0;
}

.detail-cell span {
  display: block;
  color: var(--muted);
  font-size: 13px;
}

.detail-cell strong {
  display: block;
  margin-top: 5px;
}

.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 20;
  width: min(380px, calc(100vw - 48px));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.96);
  box-shadow: var(--shadow);
  padding: 13px 14px;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 180ms ease, transform 180ms ease;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast strong { display: block; }
.toast span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 13px;
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 840px) {
  .page {
    padding: 16px;
    align-items: start;
  }

  .hero {
    grid-template-columns: 1fr;
    padding: 24px 22px 14px;
  }

  .assistant-orb {
    position: absolute;
    top: 24px;
    right: 22px;
    width: 78px;
    height: 78px;
  }

  .assistant-face {
    width: 50px;
    height: 33px;
    gap: 8px;
    padding: 0 10px;
  }

  .assistant-face span {
    width: 8px;
    height: 8px;
  }

  .brand {
    padding-right: 86px;
  }

  .brand-mark {
    width: 58px;
    height: 58px;
  }

  .brand-title {
    font-size: 26px;
  }

  .brand-sub {
    font-size: 16px;
  }

  .message-row {
    grid-template-columns: 1fr;
    padding: 0 22px 18px;
  }

  .mini-model {
    display: none;
  }

  .action-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    padding: 0 22px 18px;
  }

  .action-card {
    min-height: 138px;
    padding: 18px 12px 16px;
  }

  .result-panel {
    margin: 0 22px 18px;
    grid-template-columns: 1fr;
  }

  .result-item {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .result-item:last-child {
    border-bottom: 0;
  }

  .composer {
    padding: 0 22px 22px;
  }

  .details {
    margin: 0 22px 24px;
  }

  .detail-grid {
    grid-template-columns: 1fr;
  }

  .detail-cell {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .detail-cell:last-child {
    border-bottom: 0;
  }
}

@media (max-width: 520px) {
  body {
    font-size: 16px;
  }

  .action-grid {
    grid-template-columns: 1fr;
  }

  .composer {
    grid-template-columns: 1fr;
  }

  .send-btn {
    width: 100%;
    border-radius: var(--radius);
  }
}
</style>
</head>
<body>
<main class="page">
  <section class="skill-card" aria-label="Flora Studio Skill">
    <header class="hero">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <div class="brand-title">Flora Studio <span>Skill</span></div>
          <div class="brand-sub">你的动态花艺 AI 搭子</div>
        </div>
      </div>
      <div class="assistant-orb" aria-hidden="true">
        <div class="assistant-face"><span></span><span></span></div>
      </div>
    </header>

    <div class="message-row">
      <div class="bubble" aria-live="polite">
        <strong id="assistantTitle">Hi，我是你的动态花艺 AI 搭子</strong>
        <span id="assistantCopy">告诉我场景、情绪或已有设计，我会帮你生成预览、套件和下单前清单。</span>
      </div>
      <div class="mini-model" aria-label="建模感花艺预览">
        <canvas id="modelCanvas" width="112" height="112"></canvas>
      </div>
    </div>

    <div class="action-grid" aria-label="快捷入口">
      <button class="action-card active" type="button" data-mode="idea">
        <span class="action-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16H5zM8 8h8M8 12h8M8 16h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="action-title">说想法</span>
        <span class="action-copy">场景、情绪、预算</span>
      </button>

      <button class="action-card" type="button" data-mode="preview">
        <span class="action-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V11m0 0C7 10 5 7 5 4c4 0 7 3 7 7Zm0 0c5-1 7-4 7-7-4 0-7 3-7 7Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        </span>
        <span class="action-title">看预览</span>
        <span class="action-copy">建模花型、动态效果</span>
      </button>

      <button class="action-card" type="button" data-mode="kit">
        <span class="action-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8 12 3 3 8l9 5 9-5ZM3 8v8l9 5 9-5V8M12 13v8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        </span>
        <span class="action-title">配套件</span>
        <span class="action-copy">按花材重量和库存</span>
      </button>

      <button class="action-card" type="button" data-mode="list">
        <span class="action-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="action-title">查清单</span>
        <span class="action-copy">补货、装配、下单前</span>
      </button>
    </div>

    <section class="result-panel" aria-label="当前方案摘要">
      <div class="result-item">
        <span>动作方案</span>
        <strong id="motionResult">呼吸 + 开合 + 祝福感</strong>
      </div>
      <div class="result-item">
        <span>推荐套件</span>
        <strong id="kitResult">开合套件 · 适配 79</strong>
      </div>
      <div class="result-item">
        <span>下单前</span>
        <strong id="listResult">需补 Magic Snap、Smart Box</strong>
      </div>
    </section>

    <section class="composer" aria-label="输入想法">
      <div class="input-shell">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16M12 4v16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <textarea class="prompt" id="prompt" placeholder="随时问，随时聊...">婚礼主桌，缓慢开合，像祝福一样，机电尽量藏起来。</textarea>
      </div>
      <button class="send-btn" id="sendBtn" type="button" aria-label="发送并生成">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12 20 5l-7 15-2-6-6-2Z" fill="currentColor"/></svg>
      </button>
    </section>

    <details class="details">
      <summary>查看当前系统整理结果</summary>
      <div class="detail-grid">
        <div class="detail-cell">
          <span>花材估重</span>
          <strong>979g / 可动约 235g</strong>
        </div>
        <div class="detail-cell">
          <span>隐藏方式</span>
          <strong>花瓶背后隐藏机电</strong>
        </div>
        <div class="detail-cell">
          <span>库存状态</span>
          <strong>库存 67%，下单前确认缺件</strong>
        </div>
      </div>
    </details>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite">
  <strong id="toastTitle">已生成</strong>
  <span id="toastCopy">动态预览、套件和下单前清单已整理。</span>
</div>

<script>
const responses = {
  idea: {
    title: '先告诉我：你想做什么场景？',
    copy: '例如婚礼主桌、橱窗、礼物花束或展览装置。你也可以直接上传或描述已有设计图。',
    motion: '场景：婚礼主桌',
    kit: '下一步推荐动感',
    list: '我会把硬件细节放到后面'
  },
  preview: {
    title: '我先帮你生成一个建模感预览',
    copy: '当前会做成缓慢开合，机电藏在花瓶背后，画面只保留花艺师需要确认的造型和情绪。',
    motion: '呼吸 + 开合 + 祝福感',
    kit: '开合套件 · 适配 79',
    list: '预览已可用于沟通客户'
  },
  kit: {
    title: '套件我放在系统后面自动匹配',
    copy: '它会按花材重量、动作幅度和库存判断，不让花艺师一开始面对硬件参数。',
    motion: '可动重量约 235g',
    kit: '开合套件 · 库存 67%',
    list: '需补 2 类零件'
  },
  list: {
    title: '这是下单前，不是直接下单',
    copy: '系统只整理缺件、数量和装配建议，最后仍由花艺师确认。',
    motion: '装配约 45 分钟',
    kit: 'Servo Leaf / Magic Snap / Smart Box',
    list: 'Magic Snap ×2，Smart Box ×1'
  }
};

const canvas = document.getElementById('modelCanvas');
const ctx = canvas.getContext('2d');
let activeMode = 'idea';
let tick = 0;

function drawPetal(cx, cy, rx, ry, angle, alpha) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const grad = ctx.createRadialGradient(-rx * 0.2, -ry * 0.32, 4, 0, 0, Math.max(rx, ry));
  grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
  grad.addColorStop(0.58, `rgba(248,210,218,${alpha})`);
  grad.addColorStop(1, `rgba(215,145,164,${alpha})`);
  ctx.fillStyle = grad;
  ctx.strokeStyle = 'rgba(214,144,164,0.82)';
  ctx.lineWidth = 1.3;
  ctx.shadowColor = 'rgba(30,35,42,0.16)';
  ctx.shadowBlur = 9;
  ctx.shadowOffsetY = 5;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.stroke();
  ctx.restore();
}

function drawModel(time) {
  tick = time;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.56;
  const bloom = Math.sin(tick * 0.002) * 2.5;

  const shadow = ctx.createRadialGradient(cx, cy + 26, 4, cx, cy + 26, 44);
  shadow.addColorStop(0, 'rgba(30,35,42,0.18)');
  shadow.addColorStop(1, 'rgba(30,35,42,0)');
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 28, 38, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#7b887a';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  [[-22, -6], [22, -6], [-13, -28], [13, -28], [0, -34]].forEach(([x, y]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy + 26);
    ctx.lineTo(cx + x, cy + y);
    ctx.stroke();
  });

  drawPetal(cx - 27 - bloom, cy - 8, 13, 34, -0.9, 0.94);
  drawPetal(cx + 27 + bloom, cy - 8, 13, 34, 0.9, 0.94);
  drawPetal(cx - 14 - bloom, cy - 30, 12, 31, -0.38, 0.96);
  drawPetal(cx + 14 + bloom, cy - 30, 12, 31, 0.38, 0.96);
  drawPetal(cx, cy - 39, 13, 34, 0, 0.96);
  drawPetal(cx, cy - 20, 18, 35, 0, 1);

  const green = ctx.createRadialGradient(cx - 4, cy - 22, 2, cx, cy - 17, 15);
  green.addColorStop(0, '#d6ffe4');
  green.addColorStop(0.52, '#49d386');
  green.addColorStop(1, '#14935c');
  ctx.fillStyle = green;
  ctx.beginPath();
  ctx.arc(cx, cy - 17, 11, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#eef2f5';
  ctx.strokeStyle = '#c9d2dc';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(cx - 23, cy + 24, 46, 18, 8);
  ctx.fill();
  ctx.stroke();
}

function animate(time) {
  drawModel(time);
  requestAnimationFrame(animate);
}

function updateMode(mode) {
  activeMode = mode;
  const data = responses[mode];
  document.querySelectorAll('.action-card').forEach(card => card.classList.toggle('active', card.dataset.mode === mode));
  document.getElementById('assistantTitle').textContent = data.title;
  document.getElementById('assistantCopy').textContent = data.copy;
  document.getElementById('motionResult').textContent = data.motion;
  document.getElementById('kitResult').textContent = data.kit;
  document.getElementById('listResult').textContent = data.list;
}

function showToast(title, copy) {
  const toast = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastCopy').textContent = copy;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 2400);
}

document.querySelectorAll('.action-card').forEach(card => {
  card.addEventListener('click', () => updateMode(card.dataset.mode));
});

document.getElementById('sendBtn').addEventListener('click', () => {
  updateMode('preview');
  showToast('已生成预览', '建模预览、套件匹配和下单前清单已整理。');
});

requestAnimationFrame(animate);
</script>
</body>
</html>
