<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora Studio Platform Demo</title>
<style>
:root {
  --bg: #f6f6f2;
  --surface: #ffffff;
  --surface-2: #eeeee8;
  --line: #d9d8cf;
  --line-strong: #aaa89e;
  --ink: #141414;
  --muted: #66635c;
  --soft: #908d84;
  --green: #00a94f;
  --green-soft: #e8f6ee;
  --orange: #c96f43;
  --orange-soft: #f7ece5;
  --blue: #336f9f;
  --blue-soft: #e8f0f6;
  --red: #b64b3f;
  --red-soft: #f7e9e6;
  --radius: 8px;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  --sans: Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--bg); color: var(--ink); }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.45;
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px),
    var(--bg);
  background-size: 160px 96px;
}
button, input, textarea, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 2px solid var(--green);
  outline-offset: 2px;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  min-height: 64px;
  display: grid;
  grid-template-columns: 280px 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 0 24px;
  border-bottom: 1px solid var(--line);
  background: rgba(246,246,242,0.92);
  backdrop-filter: blur(18px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  background: var(--green);
  color: #fff;
  font-weight: 800;
}

.brand-title {
  font-weight: 800;
  letter-spacing: -0.02em;
  font-size: 17px;
}

.brand-sub {
  color: var(--muted);
  font-size: 12px;
}

.flow-steps {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.flow-step {
  min-width: 0;
  height: 34px;
  padding: 0 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.66);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 700;
}

.flow-step.active {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}

.flow-step.done {
  border-color: rgba(0,169,79,0.42);
  color: #087a3d;
  background: var(--green-soft);
}

.step-num {
  width: 18px;
  height: 18px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: rgba(20,20,20,0.08);
  font-family: var(--mono);
  font-size: 10px;
}

.flow-step.active .step-num {
  background: rgba(255,255,255,0.18);
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mode-toggle {
  min-height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink);
  font-weight: 700;
  font-size: 12px;
}

.switch {
  width: 34px;
  height: 20px;
  border-radius: 999px;
  background: var(--green);
  position: relative;
}

.switch::after {
  content: "";
  position: absolute;
  top: 3px;
  right: 3px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
}

.btn {
  min-height: 40px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--surface);
  color: var(--ink);
  font-weight: 800;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn:hover { border-color: var(--line-strong); }
.btn.primary {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.btn.dark {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.btn.ghost {
  background: transparent;
}
.btn.small {
  min-height: 32px;
  padding: 0 10px;
  font-size: 12px;
}

.main {
  width: min(1480px, calc(100% - 48px));
  margin: 24px auto 36px;
  display: grid;
  grid-template-columns: minmax(320px, 410px) minmax(440px, 1fr) minmax(320px, 390px);
  gap: 18px;
  align-items: start;
}

.panel {
  background: rgba(255,255,255,0.86);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-head {
  min-height: 52px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: rgba(255,255,255,0.72);
}

.panel-title {
  font-weight: 900;
  letter-spacing: -0.02em;
}

.panel-note {
  font-family: var(--mono);
  color: var(--soft);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.panel-body { padding: 16px; }
.stack { display: grid; gap: 14px; }
.stack.tight { gap: 10px; }

.field {
  display: grid;
  gap: 8px;
}

.field label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.textarea {
  width: 100%;
  min-height: 118px;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 12px;
  background: var(--surface);
  color: var(--ink);
}

.input {
  width: 100%;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 10px;
  background: var(--surface);
  color: var(--ink);
}

.upload {
  border: 1px dashed var(--line-strong);
  border-radius: 7px;
  min-height: 118px;
  display: grid;
  place-items: center;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.7), rgba(238,238,232,0.55));
  position: relative;
}

.upload input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-copy {
  text-align: center;
  color: var(--muted);
  padding: 18px;
}

.upload-copy strong {
  display: block;
  color: var(--ink);
  margin-bottom: 6px;
}

.upload img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  display: none;
}

.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  min-height: 34px;
  padding: 0 11px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.chip[aria-pressed="true"] {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.segmented {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line);
  border-radius: 7px;
  overflow: hidden;
  background: var(--surface);
}

.segmented button {
  min-height: 38px;
  border: 0;
  border-right: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-weight: 800;
}

.segmented button:last-child { border-right: 0; }
.segmented button.active {
  background: var(--ink);
  color: #fff;
}

.material-list {
  display: grid;
  gap: 8px;
}

.material-row {
  display: grid;
  grid-template-columns: 1fr 104px;
  gap: 10px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
}

.material-row:last-child { border-bottom: 0; }
.material-name { font-weight: 850; }
.material-meta {
  margin-top: 2px;
  color: var(--soft);
  font-family: var(--mono);
  font-size: 10px;
}

.stepper {
  display: grid;
  grid-template-columns: 30px 1fr 30px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface);
}

.stepper button {
  height: 32px;
  border: 0;
  background: var(--surface-2);
  font-weight: 900;
}

.stepper output {
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
}

.preview-panel {
  min-height: calc(100vh - 112px);
}

.preview-stage {
  position: relative;
  min-height: 560px;
  display: grid;
  grid-template-rows: 1fr auto;
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px),
    #f2f2ee;
  background-size: 25% 96px;
  overflow: hidden;
}

.workspace {
  position: relative;
  display: grid;
  place-items: center;
  padding: 28px;
}

.bouquet-wrap {
  position: relative;
  width: min(520px, 88%);
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
}

.bouquet-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 24px 26px rgba(20,20,20,0.12));
}

.motion-breath .petal-wing { animation: breath 4.8s ease-in-out infinite; }
.motion-sway .petal-wing { animation: sway 5.4s ease-in-out infinite; }
.motion-bloom .left-wing { animation: openLeft 5s ease-in-out infinite; transform-box: fill-box; transform-origin: 90% 50%; }
.motion-bloom .right-wing { animation: openRight 5s ease-in-out infinite; transform-box: fill-box; transform-origin: 10% 50%; }
.motion-blessing .petal-wing { animation: blessing 6.8s ease-in-out infinite; }

@keyframes breath {
  0%,100% { transform: scale(0.985); opacity: 0.88; }
  50% { transform: scale(1.035); opacity: 1; }
}
@keyframes sway {
  0%,100% { transform: rotate(-1.8deg) translateY(0); }
  50% { transform: rotate(2.2deg) translateY(-8px); }
}
@keyframes openLeft {
  0%,100% { transform: rotate(-3deg) translateX(0); }
  50% { transform: rotate(8deg) translateX(-8px); }
}
@keyframes openRight {
  0%,100% { transform: rotate(3deg) translateX(0); }
  50% { transform: rotate(-8deg) translateX(8px); }
}
@keyframes blessing {
  0%,100% { transform: translateY(0) scale(1); opacity: 0.86; }
  38% { transform: translateY(-7px) scale(1.025); opacity: 1; }
  68% { transform: translateY(3px) scale(0.992); opacity: 0.9; }
}

.zone {
  position: absolute;
  border: 1px solid rgba(0,169,79,0.82);
  background: rgba(0,169,79,0.08);
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: #087a3d;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.05em;
  transition: transform 160ms ease, background 160ms ease;
}

.zone:hover { transform: scale(1.03); }
.zone[data-zone="left"] { left: 12%; top: 26%; width: 24%; height: 21%; }
.zone[data-zone="right"] { right: 12%; top: 26%; width: 24%; height: 21%; }
.zone[data-zone="top"] { left: 38%; top: 12%; width: 24%; height: 18%; }
.zone[data-zone="center"] { left: 39%; top: 39%; width: 22%; height: 22%; }
.zone[data-zone="base"] { left: 36%; bottom: 10%; width: 28%; height: 16%; border-color: rgba(51,111,159,0.85); background: rgba(51,111,159,0.08); color: var(--blue); }
.zone.locked {
  border-color: rgba(182,75,63,0.9);
  background: rgba(182,75,63,0.08);
  color: var(--red);
}

.stage-footer {
  border-top: 1px solid var(--line);
  background: rgba(255,255,255,0.76);
  padding: 13px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
}

.result-strip {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.strip-item {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 10px;
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 800;
}

.strip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}

.strip-dot.warn { background: var(--orange); }
.strip-dot.blue { background: var(--blue); }

.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.metric {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,0.72);
  padding: 12px;
}

.metric-label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.metric-value {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 900;
}

.metric small {
  display: block;
  margin-top: 4px;
  color: var(--soft);
  font-size: 11px;
}

.kit-list {
  display: grid;
  gap: 10px;
}

.kit-card {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--surface);
  padding: 12px;
  display: grid;
  gap: 10px;
}

.kit-card.recommended {
  border-color: var(--green);
  box-shadow: inset 3px 0 0 var(--green);
}

.kit-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: start;
}

.kit-name {
  font-weight: 950;
  letter-spacing: -0.02em;
}

.kit-desc {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 8px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 900;
  white-space: nowrap;
}

.badge.green { background: var(--green-soft); color: #087a3d; }
.badge.orange { background: var(--orange-soft); color: #9a4f2b; }
.badge.blue { background: var(--blue-soft); color: var(--blue); }
.badge.red { background: var(--red-soft); color: var(--red); }

.bars {
  display: grid;
  gap: 7px;
}

.bar-row {
  display: grid;
  grid-template-columns: 70px 1fr 42px;
  gap: 8px;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 800;
}

.bar {
  height: 7px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: var(--green);
  width: 0%;
}

.bar.warn span { background: var(--orange); }
.bar.red span { background: var(--red); }

.parts {
  border-top: 1px solid var(--line);
  padding-top: 10px;
  display: grid;
  gap: 6px;
}

.part-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: center;
  color: var(--muted);
  font-size: 12px;
}

.part-row strong { color: var(--ink); }
.part-row .need {
  font-family: var(--mono);
  color: var(--ink);
  font-weight: 900;
}
.part-row .stock {
  font-family: var(--mono);
  color: var(--soft);
}
.part-row.missing .stock { color: var(--red); }

.procurement {
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: 7px;
  overflow: hidden;
}

.proc-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}

.proc-row:last-child { border-bottom: 0; }
.proc-name { font-weight: 850; }
.proc-reason {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}
.proc-price {
  font-family: var(--mono);
  font-weight: 950;
  color: var(--ink);
}

.professional {
  border-top: 1px solid var(--line);
  margin-top: 10px;
  padding-top: 10px;
}

.tech-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.tech-item {
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px;
  background: rgba(246,246,242,0.74);
}

.tech-item span {
  display: block;
  color: var(--soft);
  font-size: 10px;
  font-family: var(--mono);
}

.tech-item strong {
  display: block;
  margin-top: 4px;
}

.hidden { display: none !important; }

@media (max-width: 1180px) {
  .topbar { grid-template-columns: 1fr auto; }
  .flow-steps { display: none; }
  .main {
    grid-template-columns: 1fr;
    width: min(900px, calc(100% - 28px));
  }
  .preview-panel { min-height: auto; }
  .preview-stage { min-height: 520px; }
}

@media (max-width: 720px) {
  .topbar {
    grid-template-columns: 1fr;
    height: auto;
    min-height: 64px;
    padding: 12px 14px;
  }
  .top-actions { flex-wrap: wrap; }
  .metrics, .tech-grid { grid-template-columns: 1fr; }
  .stage-footer { grid-template-columns: 1fr; }
  .segmented { grid-template-columns: 1fr; }
  .segmented button { border-right: 0; border-bottom: 1px solid var(--line); }
  .segmented button:last-child { border-bottom: 0; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">F</div>
      <div>
        <div class="brand-title">Flora Studio</div>
        <div class="brand-sub">动态花艺创作台</div>
      </div>
    </div>
    <nav class="flow-steps" aria-label="创作流程">
      <div class="flow-step active" data-flow="1"><span class="step-num">1</span><span>创意输入</span></div>
      <div class="flow-step" data-flow="2"><span class="step-num">2</span><span>结构确认</span></div>
      <div class="flow-step" data-flow="3"><span class="step-num">3</span><span>套件匹配</span></div>
      <div class="flow-step" data-flow="4"><span class="step-num">4</span><span>采购确认</span></div>
    </nav>
    <div class="top-actions">
      <button class="mode-toggle" id="safeMode" type="button" aria-pressed="true"><span class="switch" aria-hidden="true"></span>新手安全模式</button>
      <button class="btn ghost small" id="resetBtn" type="button">重置</button>
      <button class="btn dark small" id="exportBtn" type="button">生成方案</button>
    </div>
  </header>

  <main class="main">
    <section class="panel" aria-labelledby="inputTitle">
      <div class="panel-head">
        <div>
          <div class="panel-title" id="inputTitle">创作输入</div>
          <div class="panel-note">idea and constraints</div>
        </div>
        <span class="badge green" id="intentBadge">已理解</span>
      </div>
      <div class="panel-body stack">
        <div class="field">
          <label for="designFile">已有设计</label>
          <div class="upload" id="uploadBox">
            <input id="designFile" type="file" accept="image/*" aria-label="上传设计图或实物图">
            <img id="uploadPreview" alt="上传的设计参考">
            <div class="upload-copy" id="uploadCopy">
              <strong>上传设计图 / 实物图</strong>
              <span>草图、现场照片、客户参考图</span>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="ideaText">想法描述</label>
          <textarea class="textarea" id="ideaText">婚礼主桌花艺，希望像被祝福一样缓慢展开，动作要克制，不要太机械，机电尽量藏在花瓶背后。</textarea>
        </div>

        <div class="field">
          <label>场景</label>
          <div class="chip-group" data-group="scene">
            <button class="chip" type="button" data-value="wedding" aria-pressed="true">婚礼主桌</button>
            <button class="chip" type="button" data-value="window" aria-pressed="false">橱窗陈列</button>
            <button class="chip" type="button" data-value="gift" aria-pressed="false">礼物花束</button>
            <button class="chip" type="button" data-value="exhibition" aria-pressed="false">展览装置</button>
            <button class="chip" type="button" data-value="retail" aria-pressed="false">商业空间</button>
          </div>
        </div>

        <div class="field">
          <label>动感</label>
          <div class="chip-group" data-group="motion">
            <button class="chip" type="button" data-value="breath" aria-pressed="true">呼吸</button>
            <button class="chip" type="button" data-value="sway" aria-pressed="false">摇曳</button>
            <button class="chip" type="button" data-value="bloom" aria-pressed="true">开合</button>
            <button class="chip" type="button" data-value="blessing" aria-pressed="true">祝福感</button>
            <button class="chip" type="button" data-value="light" aria-pressed="false">轻盈</button>
          </div>
        </div>

        <div class="field">

              <g opacity="0.34" stroke="#6f7667" stroke-width="8" fill="none">
                <path d="M300 502 C292 410 304 320 292 230"/>

              </g>
              <g class="petal-wing left-wing" fill="#ffffff" stroke="#cfd0c8" stroke-width="3">
                <path d="M292 232 C198 120 118 112 68 196 C148 212 216 230 292 232Z"/>

            <button class="zone" data-zone="left" type="button">可动</button>
            <button class="zone" data-zone="right" type="button">可动</button>
            <button class="zone" data-zone="top" type="button">可动</button>

        <div class="stage-footer">
          <div class="result-strip">
            <div class="strip-item"><span class="strip-dot"></span><span id="motionSummary">缓慢开合 + 呼吸</span></div>
            <div class="strip-item"><span class="strip-dot warn"></span><span id="weightSummary">估算 0g</span></div>
            <div class="strip-item"><span class="strip-dot blue"></span><span id="zoneSummary">3 个可动区</span></div>

            <button class="btn primary" id="prepareBtn" type="button">准备系统代办</button>

    <aside class="panel" aria-labelledby="resultTitle">
      <div class="panel-head">
        <div>
          <div class="panel-title" id="resultTitle">系统整理</div>
          <div class="panel-note">kit, inventory, purchase</div>

        <span class="badge blue" id="riskBadge">可落地</span>
      </div>
      <div class="panel-body stack">
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">花材总重</div>
            <div class="metric-value" id="totalWeight">0g</div>

          <div class="metric">

            <div class="metric-label">库存覆盖</div>

          <div class="tech-grid">
            <div class="tech-item"><span>动作周期</span><strong id="techCycle">6.8s</strong></div>
            <div class="tech-item"><span>建议幅度</span><strong id="techAngle">18°</strong></div>
            <div class="tech-item"><span>隐藏位置</span><strong id="techHide">花瓶背后</strong></div>
            <div class="tech-item"><span>装配时间</span><strong id="techTime">45 min</strong></div>
          </div>
        </div>
      </div>
    </aside>
  </main>
</div>

<script>
const state = {
  safeMode: true,
  scene: 'wedding',
  motions: new Set(['breath', 'bloom', 'blessing']),
  intensity: 'soft',
  priority: 'safe',
  hidePlace: 'back',
  zones: {
    left: 'move',
    right: 'move',
    top: 'move',
    center: 'fixed',
    base: 'hide'
  },
  materials: [
    { id: 'rose', name: '玫瑰', type: '主花', weight: 28, qty: 6 },
    { id: 'hydrangea', name: '绣球', type: '主花', weight: 320, qty: 1 },
    { id: 'eucalyptus', name: '尤加利', type: '叶材', weight: 15, qty: 8 },
    { id: 'babysbreath', name: '满天星', type: '配花', weight: 8, qty: 10 },
    { id: 'peony', name: '芍药', type: '主花', weight: 45, qty: 0 },
    { id: 'willow', name: '雪柳', type: '枝条', weight: 22, qty: 0 }
  ],
  inventory: {
    core: 2,
    miniServo: 2,
    servo: 4,
    flexStem: 8,
    magicSnap: 4,
    smartBox: 0,
    powerPack: 1
  }
};

const partsName = {
  core: 'CyberBrick Core',
  miniServo: '微型电机',
  servo: '伺服电机',
  flexStem: 'Flexi-Stem',
  magicSnap: 'Magic Snap',
  smartBox: 'Smart Box',
  powerPack: '外接电源'
};

const prices = {
  core: 248,
  miniServo: 46,
  servo: 58,
  flexStem: 18,
  magicSnap: 58,
  smartBox: 168,
  powerPack: 128
};

const kits = {
  micro: {
    name: '微动套件',
    level: '简单',
    desc: '适合单枝、叶片、小装饰的轻微摆动。',
    req: { core: 1, miniServo: 1, flexStem: 2, magicSnap: 1 },
    maxMoving: 180,
    baseScore: 78,
    minutes: 25
  },
  bloom: {
    name: '开合套件',
    level: '推荐',
    desc: '适合左右对称、六翼、花瓣层次展开。',
    req: { core: 1, servo: 3, flexStem: 6, magicSnap: 6, smartBox: 1 },
    maxMoving: 520,
    baseScore: 86,
    minutes: 45
  },
  scene: {
    name: '场景套件',
    level: '专业',
    desc: '适合橱窗、展览、大型装置的多节点联动。',
    req: { core: 1, servo: 6, flexStem: 10, magicSnap: 10, smartBox: 1, powerPack: 1 },
    maxMoving: 980,
    baseScore: 82,
    minutes: 90
  }
};

const sceneLabels = {
  wedding: '婚礼主桌',
  window: '橱窗陈列',
  gift: '礼物花束',
  exhibition: '展览装置',
  retail: '商业空间'
};

const motionLabels = {
  breath: '呼吸',
  sway: '摇曳',
  bloom: '开合',
  blessing: '祝福感',
  light: '轻盈'
};

const hideLabels = {
  back: '花瓶背后',
  base: '底座内部',
  center: '花丛中心',
  branch: '枝条后方'
};

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function renderMaterials() {
  const list = document.getElementById('materialList');
  list.innerHTML = state.materials.map((item) => `
    <div class="material-row">
      <div>
        <div class="material-name">${item.name}</div>
        <div class="material-meta">${item.type} · ${item.weight}g / 支</div>
      </div>
      <div class="stepper" data-id="${item.id}">
        <button type="button" data-action="minus" aria-label="减少 ${item.name}">-</button>
        <output>${item.qty}</output>
        <button type="button" data-action="plus" aria-label="增加 ${item.name}">+</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.stepper button').forEach((button) => {
    button.addEventListener('click', () => {
      const id = button.closest('.stepper').dataset.id;
      const material = state.materials.find((entry) => entry.id === id);
      const delta = button.dataset.action === 'plus' ? 1 : -1;
      material.qty = clamp(material.qty + delta, 0, 99);
      renderMaterials();
      update();
    });
  });
}

function getWeights() {
  const raw = state.materials.reduce((sum, item) => sum + item.qty * item.weight, 0);
  const total = Math.round(raw * 1.15);
  const moveZones = Object.values(state.zones).filter((value) => value === 'move').length;
  const intensityFactor = state.intensity === 'soft' ? 0.24 : state.intensity === 'clear' ? 0.34 : 0.46;
  const moving = Math.round(total * intensityFactor * clamp(moveZones / 3, 0.35, 1.35));
  return { raw, total, moving, moveZones };
}

function getSelectedKitKey(weights) {
  const hasBloom = state.motions.has('bloom') || state.motions.has('blessing');
  const bigScene = state.scene === 'exhibition' || state.scene === 'window' || state.intensity === 'stage';
  if (bigScene || weights.total > 1600 || weights.moving > 520) return 'scene';
  if (hasBloom || weights.moving > 180) return 'bloom';
  return 'micro';
}

function scoreKit(key, weights) {
  const kit = kits[key];
  const reqEntries = Object.entries(kit.req);
  const need = reqEntries.reduce((sum, [, qty]) => sum + qty, 0);
  const have = reqEntries.reduce((sum, [part, qty]) => sum + Math.min(state.inventory[part] || 0, qty), 0);
  const coverage = Math.round((have / need) * 100);
  const load = Math.round((weights.moving / kit.maxMoving) * 100);
  const loadPenalty = weights.moving > kit.maxMoving ? 28 : Math.max(0, load - 72) * 0.35;
  const stockBonus = state.priority === 'stock' ? coverage * 0.12 : coverage * 0.07;
  const effectBonus = state.priority === 'effect' && key !== 'micro' ? 8 : 0;
  const safeBonus = state.priority === 'safe' && load < 82 ? 8 : 0;
  const score = clamp(Math.round(kit.baseScore + stockBonus + effectBonus + safeBonus - loadPenalty), 38, 98);
  return { score, coverage, load, need, have };
}

function getKitCards(weights, recommendedKey) {
  const keys = ['micro', 'bloom', 'scene'];
  return keys.map((key) => ({ key, ...scoreKit(key, weights) })).sort((a, b) => {
    if (a.key === recommendedKey) return -1;
    if (b.key === recommendedKey) return 1;
    return b.score - a.score;
  });
}

function getMissing(req) {
  return Object.entries(req)
    .map(([part, qty]) => ({ part, qty, have: state.inventory[part] || 0, missing: Math.max(0, qty - (state.inventory[part] || 0)) }))
    .filter((item) => item.missing > 0);
}

function renderKitList(weights, recommendedKey) {
  const cards = getKitCards(weights, recommendedKey);
  const kitList = document.getElementById('kitList');
  kitList.innerHTML = cards.map((card) => {
    const kit = kits[card.key];
    const missing = getMissing(kit.req);
    const loadClass = card.load > 100 ? 'red' : card.load > 82 ? 'warn' : '';
    const stockClass = card.coverage < 70 ? 'red' : card.coverage < 100 ? 'warn' : '';
    return `
      <article class="kit-card ${card.key === recommendedKey ? 'recommended' : ''}">
        <div class="kit-head">
          <div>
            <div class="kit-name">${kit.name}</div>
            <div class="kit-desc">${kit.desc}</div>
          </div>
          <span class="badge ${card.key === recommendedKey ? 'green' : 'blue'}">${card.key === recommendedKey ? '当前推荐' : kit.level}</span>
        </div>
        <div class="bars">
          <div class="bar-row"><span>适配度</span><div class="bar"><span style="width:${card.score}%"></span></div><strong>${card.score}</strong></div>
          <div class="bar-row"><span>负载</span><div class="bar ${loadClass}"><span style="width:${clamp(card.load, 0, 100)}%"></span></div><strong>${card.load}%</strong></div>
          <div class="bar-row"><span>库存</span><div class="bar ${stockClass}"><span style="width:${card.coverage}%"></span></div><strong>${card.coverage}%</strong></div>
        </div>
        <div class="parts">
          ${Object.entries(kit.req).map(([part, qty]) => {
            const stock = state.inventory[part] || 0;
            return `<div class="part-row ${stock < qty ? 'missing' : ''}"><strong>${partsName[part]}</strong><span class="need">× ${qty}</span><span class="stock">库存 ${stock}</span></div>`;
          }).join('')}
        </div>
        ${missing.length ? `<button class="btn small" type="button" data-procure="${card.key}">生成补货清单</button>` : `<button class="btn small primary" type="button" data-confirm="${card.key}">确认此方案</button>`}
      </article>
    `;
  }).join('');

  kitList.querySelectorAll('[data-procure]').forEach((button) => {
    button.addEventListener('click', () => renderProcurement(button.dataset.procure, true, true));
  });
  kitList.querySelectorAll('[data-confirm]').forEach((button) => {
    button.addEventListener('click', () => renderProcurement(button.dataset.confirm, false, true));
  });
}

function renderProcurement(kitKey, forceOpen = false, advanceFlow = false) {
  const box = document.getElementById('procurementBox');
  const kit = kits[kitKey];
  const missing = getMissing(kit.req);
  if (!missing.length && !forceOpen) {
    box.innerHTML = `
      <div class="proc-row">
        <div>
          <div class="proc-name">${kit.name}可直接装配</div>
          <div class="proc-reason">库存已覆盖，下一步生成装配指南和客户预览。</div>
        </div>
        <div class="proc-price">¥0</div>
      </div>
    `;
    if (advanceFlow) updateFlow(4);
    return;
  }

  const total = missing.reduce((sum, item) => sum + item.missing * (prices[item.part] || 0), 0);
  box.innerHTML = `
    ${missing.map((item) => `
      <div class="proc-row">
        <div>
          <div class="proc-name">${partsName[item.part]} × ${item.missing}</div>
          <div class="proc-reason">用于${kit.name}，当前库存 ${item.have}，需求 ${item.qty}。</div>
        </div>
        <div class="proc-price">¥${item.missing * prices[item.part]}</div>
      </div>
    `).join('')}
    <div class="proc-row">
      <div>
        <div class="proc-name">下单前确认</div>
        <div class="proc-reason">到货后自动加入工具箱，不直接支付。</div>
      </div>
      <div class="proc-price">¥${total}</div>
    </div>
  `;
  if (advanceFlow) updateFlow(4);
}

function updatePreviewClass() {
  const wrap = document.getElementById('bouquetWrap');
  wrap.className = 'bouquet-wrap';
  if (state.motions.has('bloom')) wrap.classList.add('motion-bloom');
  else if (state.motions.has('sway')) wrap.classList.add('motion-sway');
  else if (state.motions.has('blessing')) wrap.classList.add('motion-blessing');
  else wrap.classList.add('motion-breath');
}

function updateZones() {
  document.querySelectorAll('.zone').forEach((zone) => {
    const value = state.zones[zone.dataset.zone];
    zone.classList.toggle('locked', value === 'fixed');
    zone.textContent = value === 'move' ? '可动' : value === 'hide' ? '隐藏' : '固定';
  });
}

function updateFlow(active = 3) {
  document.querySelectorAll('.flow-step').forEach((step) => {
    const index = Number(step.dataset.flow);
    step.classList.toggle('active', index === active);
    step.classList.toggle('done', index < active);
  });
}

function update() {
  const weights = getWeights();
  const recommendedKey = getSelectedKitKey(weights);
  const recommended = scoreKit(recommendedKey, weights);
  const recommendedKit = kits[recommendedKey];
  const motionText = Array.from(state.motions).map((key) => motionLabels[key]).slice(0, 3).join(' + ') || '呼吸';

  updatePreviewClass();
  updateZones();
  updateFlow(3);

  document.getElementById('motionSummary').textContent = motionText;
  document.getElementById('weightSummary').textContent = `估算 ${weights.total}g`;
  document.getElementById('zoneSummary').textContent = `${weights.moveZones} 个可动区`;
  document.getElementById('totalWeight').textContent = `${weights.total}g`;
  document.getElementById('movingWeight').textContent = `${weights.moving}g`;
  document.getElementById('stockCover').textContent = `${recommended.coverage}%`;
  document.getElementById('stockHint').textContent = recommended.coverage >= 100 ? '库存已覆盖' : `缺 ${getMissing(recommendedKit.req).reduce((sum, item) => sum + item.missing, 0)} 件`;
  document.getElementById('riskBadge').textContent = recommended.load > 100 ? '需降负载' : recommended.coverage < 100 ? '需补货' : '可落地';
  document.getElementById('riskBadge').className = `badge ${recommended.load > 100 ? 'red' : recommended.coverage < 100 ? 'orange' : 'blue'}`;
  document.getElementById('intentBadge').textContent = `${sceneLabels[state.scene]} · ${motionText}`;
  document.getElementById('techCycle').textContent = state.intensity === 'soft' ? '6.8s' : state.intensity === 'clear' ? '5.2s' : '3.8s';
  document.getElementById('techAngle').textContent = state.intensity === 'soft' ? '18°' : state.intensity === 'clear' ? '28°' : '42°';
  document.getElementById('techHide').textContent = hideLabels[state.hidePlace];
  document.getElementById('techTime').textContent = `${recommendedKit.minutes} min`;

  renderKitList(weights, recommendedKey);
  renderProcurement(recommendedKey, false, false);
}

function bindInputs() {
  document.querySelectorAll('.chip-group').forEach((group) => {
    group.querySelectorAll('.chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const groupName = group.dataset.group;
        if (groupName === 'scene') {
          group.querySelectorAll('.chip').forEach((item) => item.setAttribute('aria-pressed', 'false'));
          chip.setAttribute('aria-pressed', 'true');
          state.scene = chip.dataset.value;
        } else if (groupName === 'motion') {
          const active = chip.getAttribute('aria-pressed') === 'true';
          if (active && state.motions.size > 1) {
            chip.setAttribute('aria-pressed', 'false');
            state.motions.delete(chip.dataset.value);
          } else if (!active) {
            chip.setAttribute('aria-pressed', 'true');
            state.motions.add(chip.dataset.value);
          }
        }
        update();
      });
    });
  });

  document.querySelectorAll('.segmented').forEach((segment) => {
    segment.querySelectorAll('button').forEach((button) => {
      button.addEventListener('click', () => {
        if (state.safeMode && segment.dataset.segment === 'intensity' && button.dataset.value === 'stage') return;
        segment.querySelectorAll('button').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        state[segment.dataset.segment] = button.dataset.value;
        update();
      });
    });
  });

  document.getElementById('hidePlace').addEventListener('change', (event) => {
    state.hidePlace = event.target.value;
    update();
  });

  document.querySelectorAll('.zone').forEach((zone) => {
    zone.addEventListener('click', () => {
      const key = zone.dataset.zone;
      const next = state.zones[key] === 'move' ? 'fixed' : state.zones[key] === 'fixed' ? 'hide' : 'move';
      state.zones[key] = next;
      update();
    });
  });

  document.getElementById('professionalBtn').addEventListener('click', (event) => {
    const panel = document.getElementById('professionalPanel');
    const open = panel.classList.toggle('hidden') === false;
    event.currentTarget.setAttribute('aria-pressed', String(open));
    event.currentTarget.textContent = open ? '收起参数' : '展开参数';
  });

  document.getElementById('safeMode').addEventListener('click', (event) => {
    state.safeMode = !state.safeMode;
    event.currentTarget.setAttribute('aria-pressed', String(state.safeMode));
    event.currentTarget.querySelector('.switch').style.background = state.safeMode ? 'var(--green)' : 'var(--line-strong)';
    if (state.safeMode && state.intensity === 'stage') {
      state.intensity = 'clear';
      document.querySelectorAll('[data-segment="intensity"] button').forEach((button) => {
        button.classList.toggle('active', button.dataset.value === 'clear');
      });
    }
    update();
  });

  document.getElementById('prepareBtn').addEventListener('click', () => {
    const weights = getWeights();
    renderProcurement(getSelectedKitKey(weights), true, true);
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const weights = getWeights();
    const kitKey = getSelectedKitKey(weights);
    renderProcurement(kitKey, getMissing(kits[kitKey].req).length > 0, true);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state.materials.forEach((item) => { item.qty = item.id === 'rose' ? 6 : item.id === 'hydrangea' ? 1 : item.id === 'eucalyptus' ? 8 : item.id === 'babysbreath' ? 10 : 0; });
    renderMaterials();
    update();
  });

  document.getElementById('designFile').addEventListener('change', (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = document.getElementById('uploadPreview');
      img.src = reader.result;
      img.style.display = 'block';
      document.getElementById('uploadCopy').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });
}

renderMaterials();
bindInputs();
update();
</script>
</body>
</html>
